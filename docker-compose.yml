services:
  postgres:
    image: postgres:16-alpine
    container_name: trace-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trace_test
    ports:
      - "5432:5432"
    volumes:
      - trace_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trace_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: trace-redis
    ports:
      - "6379:6379"
    volumes:
      - trace_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  trace_postgres_data:
  trace_redis_data:
